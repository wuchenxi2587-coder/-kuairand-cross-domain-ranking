# ============================================================================
# KuaiRand-27K  DIN Baseline 训练配置
# 目标环境: 16GB RAM + 4GB GPU（显存）
# ============================================================================

# --------------------------------------------------
# 数据路径配置（均可通过 CLI --data_root / --meta_root / --vocabs_root 覆盖）
# --------------------------------------------------
data:
  data_root: "output/processed"
  meta_root: "output/meta"
  vocabs_root: "output/vocabs"

  train_file: "train.parquet"
  val_file: "val.parquet"
  test_standard_file: "test_standard.parquet"
  test_random_file: "test_random.parquet"

  field_schema_file: "field_schema.json"
  vocab_manifest_file: "feature_vocab_manifest.json"

# --------------------------------------------------
# 字段配置（列名与 parquet schema 对齐）
# --------------------------------------------------
fields:
  # 标签列
  label_col: "label_long_view"

  # 用户 ID 列（用于 GAUC 分组，评估时读取）
  user_id_col: "user_id_raw"

  # 元数据列（仅评估阶段读取，用于切片分析，不参与模型训练）
  meta_cols:
    - "user_id_raw"
    - "meta_is_rand"
    - "sample_time_ms"

  # ── 历史序列 ──
  # 必选（定长 list<int64>，长度 = max_hist_len）
  hist_seq_cols:
    - "hist_video_id"
    - "hist_author_id"
  hist_mask_col: "hist_mask"
  hist_len_col: "hist_len"

  # 可选历史序列列（如 parquet 中存在则读取，不存在自动跳过）
  optional_hist_seq_cols:
    - "hist_delta_t_bucket"
    - "hist_play_ratio_bucket"
    - "hist_tab"

  # ── 候选 item ──
  cand_cols:
    video_id: "cand_video_id"
    author_id: "cand_author_id"
    video_type: "cand_video_type"
    upload_type: "cand_upload_type"
    duration_bucket: "cand_video_duration_bucket"
    pre_ctr_bucket: "cand_pre_ctr_bucket"
    pre_lv_rate_bucket: "cand_pre_lv_rate_bucket"
    pre_like_rate_bucket: "cand_pre_like_rate_bucket"
    pre_play_ratio_bucket: "cand_pre_play_ratio_bucket"
    pre_show_bucket: "cand_pre_show_bucket"

  # ── 上下文 sparse ──
  context_sparse_cols:
    - "tab"
    - "hour_of_day"
    - "day_of_week"
    - "is_weekend"

  # ── 用户 sparse ──
  user_sparse_cols:
    - "user_active_degree"
    - "is_lowactive_period"
    - "is_live_streamer"
    - "is_video_author"
    - "follow_user_num_range"
    - "fans_user_num_range"
    - "friend_user_num_range"
    - "register_days_range"
    - "onehot_feat0"
    - "onehot_feat1"
    - "onehot_feat2"
    - "onehot_feat3"
    - "onehot_feat4"
    - "onehot_feat5"
    - "onehot_feat6"
    - "onehot_feat7"
    - "onehot_feat8"
    - "onehot_feat9"
    - "onehot_feat10"
    - "onehot_feat11"
    - "onehot_feat12"
    - "onehot_feat13"
    - "onehot_feat14"
    - "onehot_feat15"
    - "onehot_feat16"
    - "onehot_feat17"

  # ── 用户 dense（float32）──
  user_dense_cols:
    - "log1p_follow_user_num"
    - "log1p_fans_user_num"
    - "log1p_friend_user_num"
    - "log1p_register_days"

  cand_dense_cols:
    - "cand_pre_ctr"
    - "cand_pre_lv_rate"
    - "cand_pre_like_rate"
    - "cand_pre_play_ratio"
    - "cand_pre_show_log"

# --------------------------------------------------
# 模型配置
# --------------------------------------------------
model:
  # Embedding 维度
  video_id_emb_dim: 32
  author_id_emb_dim: 16
  sparse_emb_dim: 4             # 小词表字段默认维度
  large_sparse_emb_dim: 8       # 大词表字段维度
  large_sparse_threshold: 100   # vocab_size > 此值 → 用 large_sparse_emb_dim

  # 哈希 Embedding（大幅降低 video_id / author_id 的显存占用）
  # 原始 video_id 有 3200 万，全量 embedding 需 ~4GB 显存，远超 4GB 上限。
  # 取模映射到 100 万桶 → ~128MB，author 同理。
  use_hash_embedding: true
  video_id_hash_buckets: 1000000
  author_id_hash_buckets: 500000

  # DNN 塔
  dnn_hidden_units: [256, 128, 64]
  dnn_dropout: 0.1
  dnn_use_bn: true

  # DIN Attention 网络
  att_hidden_units: [64, 32]

  # 历史序列最大长度（与预处理一致）
  max_hist_len: 50

# --------------------------------------------------
# 训练配置
# --------------------------------------------------
training:
  epochs: 1
  batch_size: 4096             # 原来 1024
  learning_rate: 0.001
  weight_decay: 1.0e-5
  optimizer: "adamw"              # adam / adamw

  # AMP 混合精度（减少 ~50% 显存）
  use_amp: true
  amp_dtype: "bfloat16"

  # 梯度策略（适配小显存）
  gradient_accum_steps: 1       # 原来 2
  grad_clip_norm: 1.0

  # 日志
  log_every_n_steps: 500

  # 验证频率：0 = 每个 epoch 结束验证一次
  eval_every_n_steps: 0

  # Early stopping
  patience: 3
  monitor_metric: "gauc"        # auc / gauc / logloss

  # Checkpoint
  save_best_only: true

# --------------------------------------------------
# DataLoader 配置
# --------------------------------------------------
dataloader:
  num_workers: 0
  pin_memory: true
  # shuffle_buffer_size: 跨 row group 的 shuffle buffer 大小
  # 0 = 仅在 row group 内部 shuffle（最省内存，推荐）
  # >0 = 启用跨 row group shuffle buffer（更好打乱，额外内存 ≈ buffer_size × 3KB）
  shuffle_buffer_size: 0
  prefetch_factor: 2
  drop_last: true

# --------------------------------------------------
# 评估配置
# --------------------------------------------------
eval:
  batch_size: 512
  num_workers: 0
  # 内存保护：preds/labels/user_ids 累积超过此大小时自动落盘
  memory_threshold_gb: 2.0

# --------------------------------------------------
# 全局
# --------------------------------------------------
seed: 42
device: "auto"                  # auto / cuda / cpu
run_name: "din_baseline"
